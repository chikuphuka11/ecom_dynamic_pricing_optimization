name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt httpx pytest pytest-cov
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/test_api.py tests/test_guardrails.py -v --cov=src
